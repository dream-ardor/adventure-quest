<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title> Aurora's Adventure Quest</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        #gameContainer {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 20px;
        }
        
        canvas {
            display: block;
            background: #2d3748;
            border-radius: 8px;
        }
        
        #info {
            margin-top: 15px;
            color: #4a5568;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="info">Use Arrow Keys to Move • Aurora Adventure Quest Made with ❤️ by Dad</div>
    </div>
    
<!-- Load game files in correct order -->
<script src="player.js"></script>
<script src="fruit.js"></script>
<script src="soundManager.js"></script>
<script src="particle.js"></script>
<script src="game.js"></script>
